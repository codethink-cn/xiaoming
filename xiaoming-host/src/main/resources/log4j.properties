log4j.rootLogger = INFO,root,stdout

#配置打印到控制台的相关配置
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.Target=System.out
log4j.appender.stdout.layout=com.chuanwise.xiaoming.host.log.ColorPatternLayout
#%d{yyyy-MM-dd HH:mm:ss,SSS} [%-5p] [method:%l]%n %m%n
#log4j.appender.stdout.layout.conversionPattern=%d{yyyy-MM-dd HH:mm:ss,SSS} [%-5p] %m%n

#配置打印到文件相关配置
log4j.appender.root=org.apache.log4j.DailyRollingFileAppender
#打印的文件名称和文件位置
log4j.appender.root.File=logs/latest.log
log4j.appender.File.DatePattern='.'yyyy-MM-dd
#设置以追加形式打印
log4j.appender.root.Append=true
#日志格式
#log4j.appender.root.layout.ConversionPattern=%d{yyyy-MM-dd HH:mm:ss,SSS} [%-5p] %m%n
log4j.appender.root.layout=com.chuanwise.xiaoming.host.log.UncolorPatternLayout